{% extends 'imaging/base.html' %}

{% block content %}

<div class="dashboard-header">
    <div>
        <h2 class="page-title">New Scan</h2>
        <p style="font-size:13px;color:#8a9bb5;margin-top:2px">Upload a medical image for AI analysis</p>
    </div>
</div>

<div class="card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <h3 class="section-label">Patient Info</h3>
        <label>Full Name</label>
        {{ patient_form.name }}
        <label>Age</label>
        {{ patient_form.age }}
        <label>Medical Record Number (MRN)</label>
        {{ patient_form.mrn }}

        <h3 class="section-label" style="margin-top:1.5rem">Scan Details</h3>
        <label>Scan Type</label>
        {{ scan_form.scan_type }}
        <label>Upload Image</label>
        {{ scan_form.image }}

        <div style="margin-top:1.5rem;display:flex;gap:10px;align-items:center">
            <button type="submit" class="btn btn-accent">Analyze with Claude AI</button>
            <a href="{% url 'dashboard' %}" class="btn">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
