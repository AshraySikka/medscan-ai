{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedScan AI</title>
    <!-- linking our external stylesheet -->
    <link rel="stylesheet" href="{% static 'imaging/style.css' %}">
</head>
<body>

    <!-- top navigation bar -->
    <nav>
        <a href="{% url 'dashboard' %}" class="brand">MedScan <span>AI</span></a>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'upload_scan' %}">New Scan</a>
    </nav>

    <!-- main content area, each page fills this block -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- footer -->
    <footer class="site-footer">
        <div class="site-footer-inner">
            <span class="footer-brand">MedScan <span>AI</span></span>
            <span class="footer-copy">&copy; 2026 Ashray Sikka | All rights reserved</span>
        </div>
    </footer>

</body>
</html>
